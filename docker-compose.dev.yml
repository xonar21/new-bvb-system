services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: bvb-backend-dev
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: bvb_datatable
      PG_USER: postgres
      PG_PASSWORD: secret
      PG_SSLMODE: disable
      JWT_SECRET: "super_secret_key_change_in_prod"
      CORS_ORIGINS: "http://localhost:5173"
      REDIS_ADDR: "redis:6379"
      ENV: "development"
      GOOGLE_SHEET_ID: "1_Ri5kpUwYzIXW1VfJ4r7qARAEgYbLN4CSNLfMqkKoss"
      GOOGLE_SERVICE_ACCOUNT: "/app/service-account.json"
    volumes:
      - ./backend/service-account.json:/app/service-account.json:ro
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bvb-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bvb-pgadmin-dev
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bvb.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      - postgres
    networks:
      - bvb-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: bvb-frontend-dev
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_API: http://backend:3001
      VITE_PROXY_WS: ws://backend:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - bvb-network
