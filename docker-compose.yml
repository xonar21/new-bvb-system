version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bvb-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: bvb_datatable
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bvb-network

  redis:
    image: redis:7-alpine
    container_name: bvb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bvb-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bvb-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: bvb_datatable
      PG_USER: postgres
      PG_PASSWORD: secret
      PG_SSLMODE: disable
      JWT_SECRET: "super_secret_key_change_in_prod"
      CORS_ORIGINS: "http://localhost:8080"
      REDIS_ADDR: "redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bvb-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bvb-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - bvb-network

networks:
  bvb-network:

volumes:
  pgdata:
