services:
  postgres:
    image: postgres:16-alpine
    container_name: bvb-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: bvb_datatable
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bvb-network

  redis:
    image: redis:7-alpine
    container_name: bvb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bvb-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bvb-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: bvb_datatable
      PG_USER: postgres
      PG_PASSWORD: secret
      PG_SSLMODE: disable
      JWT_SECRET: "super_secret_key_change_in_prod"
      CORS_ORIGINS: "http://localhost:8080"
      REDIS_ADDR: "redis:6379"
      SYNC_ENABLED: "true"
      GOOGLE_SHEET_ID: "1_Ri5kpUwYzIXW1VfJ4r7qARAEgYbLN4CSNLfMqkKoss"
      GOOGLE_SERVICE_ACCOUNT: "/app/service-account.json"
      MCC_ENABLED: "true"
      MCC_BASE_URL: "https://abus-tms-pr1.jdadelivers.com"
      MCC_LOGIN_USER: "BVBM"
      MCC_LOGIN_TOKEN: "2278716|3257433|1775376|3823906|13835|3147860|3987922|1888210|1593172|2997170|2159210|2159210|2853522|1961031|4307781|4307781|1991130|2034342|"  # Token from DevTools LoginViewController.jsp POST
      MCC_NAVPAD_CONTEXT_ID: "1422331"
      MCC_SYNC_INTERVAL_MINUTES: "5"
    volumes:
      - ./backend/service-account.json:/app/service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bvb-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bvb-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./infra/pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres
    networks:
      - bvb-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bvb-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - bvb-network

networks:
  bvb-network:

volumes:
  pgdata:
  pgadmin-data:
